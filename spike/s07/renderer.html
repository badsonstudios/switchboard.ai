<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css" />
  <style>
    html, body { height: 100%; margin: 0; background: #1e1e1e; }
    #terminal { height: 100%; width: 100%; }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script>
    /* global Terminal */
    // Hard scrollback cap — the S6/S7 memory-bound probe point.
    const term = new Terminal({ cols: 120, rows: 30, scrollback: 5000, theme: { background: '#1e1e1e' } });
    term.open(document.getElementById('terminal'));
    window.spike.onData((d) => term.write(d));
    term.onData((d) => window.spike.input(d));

    // Event-loop jank monitor: setInterval drift under load.
    let max = 0, n = 0, last = performance.now();
    setInterval(() => {
      const now = performance.now();
      const delay = now - last - 100;
      if (delay > max) max = delay;
      n++; last = now;
      if (n % 20 === 0) window.spike.jank({ maxDelayMs: Math.round(max), samples: n });
    }, 100);
  </script>
</body>
</html>
